name: 'CodeQL'

on:
  push:
    branches: ['develop']
  pull_request:
    branches: ['develop']
  schedule:
    - cron: '32 13 * * 0'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'blacksmith-4vcpu-ubuntu-2204' }}
    timeout-minutes: ${{ (matrix.language == 'swift' && 120) || 360 }}
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@4d991eb9b905ef189e4c376166672c3f2f230481
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@85e6279cec87321a52edac9c87bce653a07cf6c2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9f45e7498becbbc08084a122b4be9ab534ac6d88
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@9f45e7498becbbc08084a122b4be9ab534ac6d88

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@9f45e7498becbbc08084a122b4be9ab534ac6d88
        with:
          category: '/language:${{ matrix.language }}'
