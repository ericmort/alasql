name: 'CodeQL'

on:
  push:
    branches: ['develop']
  pull_request:
    branches: ['develop']
  schedule:
    - cron: '32 13 * * 0'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'blacksmith-4vcpu-ubuntu-2204' }}
    timeout-minutes: ${{ (matrix.language == 'swift' && 120) || 360 }}
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@41d3351872a2104cca2e1c0c05eae533d14f3967
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@cbb722410c2e876e24abbe8de2cc27693e501dcb

      - name: Initialize CodeQL
        uses: github/codeql-action/init@83923549f688e42b34d0b90ee94725f7c30532fc
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@83923549f688e42b34d0b90ee94725f7c30532fc

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@83923549f688e42b34d0b90ee94725f7c30532fc
        with:
          category: '/language:${{ matrix.language }}'
